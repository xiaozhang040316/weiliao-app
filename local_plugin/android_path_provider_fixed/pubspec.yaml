name: android_path_provider
description: Android specific path provider. Provides external storage path, external cache path, etc.
version: 0.3.0+1
author: mix1009 <mix1009@gmail.com>
homepage: https://github.com/mix1009/android_path_provider

environment:
  sdk: ">=2.12.0 <3.0.0"
  flutter: ">=1.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.mix1009.android_path_provider
        pluginClass: AndroidPathProviderPlugin
