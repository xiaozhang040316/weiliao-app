name: iOS Unsigned Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install exact Flutter 3.19.6
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 --branch 3.19.6 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain versions
        run: |
          flutter --version
          dart --version
          xcodebuild -version
          echo "--- pubspec.lock present? ---"
          ls -la pubspec.lock
          echo "--- locked font_awesome / spinkit / wechat_picker ---"
          grep -A3 -E "^  (font_awesome_flutter|flutter_spinkit|wechat_picker_library):" pubspec.lock | grep -E "version:" || true

      - name: Flutter pub get (respect committed lock)
        run: flutter pub get

      - name: Precache iOS engine (Flutter.xcframework)
        run: flutter precache --ios

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update || pod install

      - name: Build unsigned iOS (signing disabled)
        run: |
          flutter build ios --release --config-only --no-codesign
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner -configuration Release -sdk iphoneos \
            -derivedDataPath build_ios \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package unsigned IPA
        run: |
          cd build_ios/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r "$GITHUB_WORKSPACE/weiliao-unsigned.ipa" Payload
          ls -lh "$GITHUB_WORKSPACE/weiliao-unsigned.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: weiliao-unsigned-ipa
          path: weiliao-unsigned.ipa
          if-no-files-found: error
