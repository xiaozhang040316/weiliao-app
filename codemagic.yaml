workflows:
  ios-unsigned:
    name: iOS Unsigned IPA (weiliao)
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      flutter: 3.19.6
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: Pod install
        script: |
          cd ios && pod install --repo-update || pod install
      - name: Build unsigned iOS (signing fully disabled)
        script: |
          flutter build ios --release --config-only
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner -configuration Release -sdk iphoneos \
            -derivedDataPath build_ios \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build
      - name: Package unsigned IPA
        script: |
          cd build_ios/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r "$CM_BUILD_DIR/weiliao-unsigned.ipa" Payload
          echo "IPA size:"; ls -lh "$CM_BUILD_DIR/weiliao-unsigned.ipa"
    artifacts:
      - weiliao-unsigned.ipa
      - build_ios/Build/Products/Release-iphoneos/Runner.app
